<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inyan</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel to run JSX in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [dateInfo, setDateInfo] = useState({
                fullDate: "טוען...",
                holiday: "",
                isNight: false,
                nextZman: null,
                locationName: ""
            });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const removeNikud = (text) => {
                if (!text) return "";
                return text.replace(/[\u0591-\u05C7]/g, "");
            };

            const zmanNamesHeb = {
                alotHaShachar: "עלות השחר",
                misheyakir: "משיכיר",
                sunrise: "נץ החמה",
                sofZmanShmaMGA: "סוף זמן קריאת שמע (מג״א)",
                sofZmanShma: "סוף זמן קריאת שמע (גר״א)",
                sofZmanTfilla: "סוף זמן תפילה",
                chatzot: "חצות היום",
                minchaGedola: "מנחה גדולה",
                minchaKetana: "מנחה קטנה",
                plagHaMincha: "פלג המנחה",
                sunset: "שקיעה",
                tzeit: "צאת הכוכבים"
            };

            useEffect(() => {
                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/@hebcal/core@latest/dist/bundle.min.js";
                script.async = true;
                
                script.onload = () => {
                    const fetchAllData = async () => {
                        try {
                            const hb = window.hebcal || window.hbcore;
                            if (!hb) throw new Error("Hebcal library failed to load");

                            let lat = 40.7128, lon = -74.0060, city = "New York", region = "NY";
                            try {
                                const ipRes = await fetch('https://ipapi.co/json/');
                                if (ipRes.ok) {
                                    const ipData = await ipRes.json();
                                    if (ipData.latitude) {
                                        lat = ipData.latitude; lon = ipData.longitude;
                                        city = ipData.city; region = ipData.region_code || ipData.region;
                                    }
                                }
                            } catch (e) { console.warn("Location fetch failed"); }

                            const now = new Date();
                            const nowTime = now.getTime();
                            
                            const zmanimRes = await fetch(`https://www.hebcal.com/zmanim?cfg=json&latitude=${lat}&longitude=${lon}&tgt=1`);
                            if (!zmanimRes.ok) throw new Error("Zmanim API error");
                            const zmanimData = await zmanimRes.json();
                            const times = zmanimData.times;

                            const sunsetTime = new Date(times.sunset).getTime();
                            const alotTime = new Date(times.alotHaShachar).getTime();
                            
                            // isNight is true from Sunset until Alot HaShachar
                            const isNight = nowTime >= sunsetTime || nowTime < alotTime;

                            // CRITICAL FIX: Determine if we should tell the API "advance the day"
                            // If it's after sunset but BEFORE midnight, gs=1 (add a day).
                            // If it's AFTER midnight but BEFORE alot hashachar, the civil date is already "tomorrow",
                            // so gs=0 (don't add another day).
                            const isAfterMidnight = now.getHours() < 12 && nowTime < alotTime;
                            const shouldAdvanceDay = isNight && !isAfterMidnight;

                            const gy = now.getFullYear();
                            const gm = now.getMonth() + 1;
                            const gd = now.getDate();
                            const afterSunsetParam = shouldAdvanceDay ? '&gs=1' : '&gs=0';
                            
                            const apiRes = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${gy}&gm=${gm}&gd=${gd}${afterSunsetParam}&g2h=1&h=1&lg=he`);
                            const apiData = await apiRes.json();

                            const hDateObj = new hb.HDate(apiData.hd, apiData.hm, apiData.hy);
                            const dayIndex = hDateObj.getDay();
                            
                            const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
                            const dayName = daysHeb[dayIndex];
                            const prefix = isNight ? "ליל" : "יום";

                            let displayEvents = "";
                            if (apiData.events && apiData.events.length > 0) {
                                displayEvents = apiData.events
                                    .map(e => removeNikud(e))
                                    .filter(e => !/[a-zA-Z]/.test(e)) 
                                    .join(" | ");
                            }

                            let nextZmanKey = null;
                            let nextZmanTimeText = null;
                            const timeEntries = Object.entries(times)
                                .map(([key, value]) => ({ key, time: new Date(value) }))
                                .sort((a, b) => a.time - b.time);

                            for (let entry of timeEntries) {
                                if (entry.time.getTime() > nowTime && zmanNamesHeb[entry.key]) {
                                    nextZmanKey = zmanNamesHeb[entry.key];
                                    nextZmanTimeText = entry.time.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                                    break;
                                }
                            }

                            setDateInfo({
                                fullDate: `${prefix} ${dayName}, ${removeNikud(apiData.hebrew)}`,
                                holiday: displayEvents,
                                isNight: isNight,
                                nextZman: nextZmanKey ? { name: nextZmanKey, time: nextZmanTimeText } : null,
                                locationName: `${city}, ${region}`
                            });
                            setError(null);
                            setLoading(false);
                        } catch (err) {
                            console.error(err);
                            setError("שגיאה בטעינת נתונים");
                            setLoading(false);
                        }
                    };

                    fetchAllData();
                    const interval = setInterval(fetchAllData, 30000);
                    return () => clearInterval(interval);
                };
                document.body.appendChild(script);
            }, []);

            if (error) return <div className="min-h-screen flex items-center justify-center bg-red-50 text-red-900 p-4">שגיאה: {error}</div>;

            return (
                <div className={`min-h-screen flex flex-col items-center justify-center transition-all duration-1000 ${dateInfo.isNight ? 'bg-slate-950 text-slate-200' : 'bg-blue-50 text-slate-800'}`}>
                    <div className={`p-8 rounded-[2.5rem] shadow-xl text-center max-w-lg w-full border transition-all ${dateInfo.isNight ? 'bg-slate-900 border-slate-800' : 'bg-white border-blue-50'}`}>
                        {loading ? (
                            <div className="animate-pulse space-y-6 flex flex-col items-center">
                                <div className="h-4 w-12 bg-slate-200 dark:bg-slate-700 rounded"></div>
                                <div className="h-16 w-16 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                                <div className="h-10 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div>
                            </div>
                        ) : (
                            <>
                                <div className="text-xs font-medium opacity-40 select-none mb-3 tracking-widest">בס"ד</div>
                                <div className="text-6xl mb-6 drop-shadow-lg">{dateInfo.isNight ? '🌙' : '☀️'}</div>
                                <h1 className="text-3xl md:text-5xl font-semibold mb-4 tracking-tight leading-tight" dir="rtl">{dateInfo.fullDate}</h1>
                                {dateInfo.holiday && <div className="mt-1 mb-6 inline-block px-5 py-2 rounded-xl bg-amber-500/5 text-amber-600/90 dark:text-amber-400/90 text-lg font-medium border border-amber-500/10">{dateInfo.holiday}</div>}
                                {dateInfo.nextZman && (
                                    <div className={`mt-2 p-4 rounded-[1.5rem] border flex flex-col items-center justify-center transition-all ${dateInfo.isNight ? 'bg-slate-800/30 border-slate-700/50' : 'bg-blue-50/30 border-blue-100/50'}`}>
                                        <span className="text-[10px] font-medium opacity-50 mb-1">הזמן הקרוב (בעל התניא):</span>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-xl font-semibold text-blue-600/80 dark:text-blue-400/80">{dateInfo.nextZman.name}</span>
                                            <span className="text-2xl font-light tracking-wide">{dateInfo.nextZman.time}</span>
                                        </div>
                                        <div className="mt-2 text-[9px] uppercase tracking-widest opacity-40 font-medium" dir="rtl">חישוב עבור: {dateInfo.locationName}</div>
                                    </div>
                                )}
                                <div className="mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 opacity-40 text-[10px] font-medium flex flex-wrap justify-center gap-4">
                                    <span>© מאיר דרוק</span>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
